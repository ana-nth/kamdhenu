# ============================================================
# ABOUT SECTION
# ============================================================
about:
  label: "Who We Are"
  headline: "Leading Experts in Plastic Recycling"
  body: >
    Kamdhenu 3D Global is committed to delivering high-quality plastic raw materials 
    for different industries including packaging, automotive, and consumer goods. 
    Our focus is on quality, reliability, and long-term partnerships with our customers.

    We are specialists for HDPE, LDPE, and PP granules manufacturing plants ranging 
    from 50 to 500 kg/hr. Our expert team provides end-to-end consulting for plant 
    setup, process optimization, and machinery selection.
  highlights:
    - "Plant Setup & Layout Design"
    - "Machinery & Process Expert"
    - "Cost Optimization Specialists"
    - "Raw Material Sourcing"
  image_1: "/images/extruder-1.png"
  image_1_alt: "Advanced Plastic Extrusion Machinery"
  image_2: "/images/extruder-2.png"
  image_2_alt: "Kamdhenu 3D Global Production Facility"

# ============================================================
# PRODUCTS
# ============================================================
products:
  label: "Our Products"
  headline: "High-Quality Plastic Granules"
  subheadline: >
    We supply premium grade recycled granules engineered for performance 
    and sustainability across various industrial applications.
  items:
    - id: "pp-granules"
      category: "Recycled"
      name: "PP Granules"
      description: >
        High-performance Polypropylene granules suitable for injection 
        molding and woven bags applications.
      image: "/images/pp-granules.png"
      image_alt: "Industrial Polypropylene (PP) Granules"

    - id: "hdpe-granules"
      category: "Recycled"
      name: "HDPE Granules"
      description: >
        Durable High-Density Polyethylene granules ideal for blow 
        molding and pipe extrusion.
      image: "/images/hdpe-granules.png"
      image_alt: "High-Density Polyethylene (HDPE) Granules"

    - id: "ldpe-granules"
      category: "Recycled"
      name: "LDPE Granules"
      description: >
        Flexible Low-Density Polyethylene granules for high-quality 
        film production and packaging.
      image: "/images/ldpe-granules.png"
      image_alt: "Low-Density Polyethylene (LDPE) Granules"

    - id: "reprocessed-granules"
      category: "Sustainability"
      name: "Reprocessed Plastic Granules"
      description: >
        Eco-friendly reprocessed granules that offer cost-effective 
        alternatives without compromising on quality.
      image: "/images/reprocessed-granules.jpg"
      image_alt: "Reprocessed Plastic Granules"

